<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inbox — MailAgent Console</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="doc-page" data-site="docs" data-doc="dashboard">
    <div id="site-nav"></div>

    <div class="doc-layout">
      <aside class="doc-sidebar" id="site-doc-nav" aria-label="Documentation"></aside>
      <article class="doc-content">
        <p><a href="/dashboard.html">← Console</a></p>
        <h1 id="title">Inbox</h1>
        <p class="doc-lead" id="lead">Loading…</p>

        <form class="app-form" id="form" onsubmit="return false">
          <label for="base">API base</label>
          <input id="base" type="url" value="https://api.webmailagent.com" />
          <label for="key">API key</label>
          <input id="key" type="password" autocomplete="off" placeholder="ma_…" />
          <button type="button" id="load">Refresh</button>
        </form>

        <div class="app-card" id="out">Enter API key.</div>
      </article>
    </div>

    <div id="site-footer"></div>
    <script src="/site-shell.js" defer></script>
    <script>
      const KEY = "mailagent_dashboard_key";
      const params = new URLSearchParams(location.search);
      const inboxId = params.get("inbox");
      const baseEl = document.getElementById("base");
      const keyEl = document.getElementById("key");
      const out = document.getElementById("out");
      const titleEl = document.getElementById("title");
      const leadEl = document.getElementById("lead");

      let lastDetail = null;

      if (localStorage.getItem(KEY)) keyEl.value = localStorage.getItem(KEY);
      if (!inboxId) {
        leadEl.textContent = "Missing ?inbox=INBOX_ID in URL.";
      }

      function esc(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function apiHeaders() {
        return {
          Authorization: `Bearer ${keyEl.value.trim()}`,
          "Content-Type": "application/json",
        };
      }

      async function api(path, opts) {
        const base = baseEl.value.replace(/\/$/, "");
        const r = await fetch(`${base}${path}`, {
          ...opts,
          headers: { ...apiHeaders(), ...(opts?.headers || {}) },
        });
        const json = await r.json().catch(() => ({}));
        return { ok: r.ok, status: r.status, json };
      }

      function renderCompose(d) {
        if (!d.outbound?.enabled) {
          return `<div class="console-banner">Outbound send unavailable (Resend not configured on API).</div>`;
        }
        let banner = "";
        if (!d.outbound.verifiedFrom) {
          banner = `<div class="console-banner">Tip: set <code>OUTBOUND_FROM</code> on the Worker for a verified send domain.</div>`;
        }
        return `${banner}
          <div class="console-compose" id="compose">
            <h2>Send email</h2>
            <label for="send-to">To</label>
            <input id="send-to" type="email" placeholder="user@example.com" />
            <label for="send-subject">Subject</label>
            <input id="send-subject" type="text" placeholder="Hello from MailAgent" />
            <label for="send-text">Body</label>
            <textarea id="send-text" placeholder="Plain text body…"></textarea>
            <button type="button" class="app-btn" id="send-btn">Send</button>
          </div>`;
      }

      function bindCompose(d) {
        document.getElementById("send-btn")?.addEventListener("click", async () => {
          const to = document.getElementById("send-to").value.trim();
          const subject = document.getElementById("send-subject").value.trim();
          const text = document.getElementById("send-text").value;
          if (!to || !subject) {
            alert("To and subject required");
            return;
          }
          const r = await api(`/v1/inboxes/${encodeURIComponent(inboxId)}/send`, {
            method: "POST",
            body: JSON.stringify({ to, subject, text }),
          });
          if (r.ok) {
            load();
          } else {
            alert(r.json.error || r.json.message || "Send failed");
          }
        });

        out.querySelectorAll("[data-reply]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const messageId = btn.getAttribute("data-reply");
            const from = btn.getAttribute("data-from") || "";
            const subject = btn.getAttribute("data-subject") || "";
            const text = prompt(`Reply to ${from}:`, "");
            if (text == null) return;
            const r = await api(
              `/v1/inboxes/${encodeURIComponent(inboxId)}/messages/${encodeURIComponent(messageId)}/reply`,
              { method: "POST", body: JSON.stringify({ text }) }
            );
            if (r.ok) load();
            else alert(r.json.error || r.json.message || "Reply failed");
          });
        });
      }

      function renderDetail(d) {
        titleEl.textContent = d.address || "Inbox";
        leadEl.textContent = d.label
          ? `Label: ${d.label} · expires ${new Date(d.expiresAt).toLocaleString()}`
          : `Expires ${new Date(d.expiresAt).toLocaleString()}`;

        let html = `<p class="console-meta"><code>${esc(d.id)}</code>`;
        if (d.callbackUrl) html += ` · callback configured`;
        html += `</p>`;

        html += renderCompose(d);

        if (d.troubleshooting?.length) {
          html += `<h2>Hints</h2><ul class="console-keys">`;
          for (const h of d.troubleshooting) html += `<li>${esc(h)}</li>`;
          html += `</ul>`;
        }

        html += `<h2>Messages (${d.messageCount})</h2>`;
        if (!d.messages?.length) {
          html += `<p class="console-empty">No messages yet.</p>`;
        } else {
          html += `<table class="console-table"><thead><tr><th>From</th><th>Subject</th><th>OTP</th><th>Received</th><th></th></tr></thead><tbody>`;
          for (const m of d.messages) {
            const replyBtn = d.outbound?.enabled
              ? `<button type="button" class="console-reply-btn" data-reply="${esc(m.id)}" data-from="${esc(m.from)}" data-subject="${esc(m.subject)}">Reply</button>`
              : "";
            html += `<tr>
              <td>${esc(m.from)}</td>
              <td>${esc(m.subject)}</td>
              <td>${m.otp ? `<code>${esc(m.otp)}</code>` : "—"}</td>
              <td>${esc(new Date(m.receivedAt).toLocaleString())}</td>
              <td>${replyBtn}</td>
            </tr>`;
          }
          html += `</tbody></table>`;
        }

        html += `<h2>Threads (${d.threads?.length ?? 0})</h2>`;
        if (!d.threads?.length) {
          html += `<p class="console-empty">No threads.</p>`;
        } else {
          html += `<table class="console-table"><thead><tr><th>Subject</th><th>Msgs</th><th>Last</th></tr></thead><tbody>`;
          for (const t of d.threads) {
            html += `<tr>
              <td>${esc(t.subject || "(no subject)")}</td>
              <td>${t.messageCount}</td>
              <td>${esc(new Date(t.lastMessageAt).toLocaleString())}</td>
            </tr>`;
          }
          html += `</tbody></table>`;
        }

        if (d.callbacks?.length) {
          html += `<h2>Callbacks</h2><table class="console-table"><thead><tr><th>Status</th><th>URL</th><th>When</th></tr></thead><tbody>`;
          for (const cb of d.callbacks) {
            html += `<tr>
              <td>${cb.ok ? "OK" : esc(cb.error || cb.statusCode || "fail")}</td>
              <td class="debug-mono">${esc(cb.callbackUrl)}</td>
              <td>${esc(new Date(cb.createdAt).toLocaleString())}</td>
            </tr>`;
          }
          html += `</tbody></table>`;
        }

        html += `<p class="console-links"><a href="${esc(d.links?.debug)}">Full debug UI</a></p>`;
        out.innerHTML = html;
        bindCompose(d);
      }

      async function load() {
        if (!inboxId) return;
        const key = keyEl.value.trim();
        if (!key) return;
        localStorage.setItem(KEY, key);
        out.textContent = "Loading…";

        const r = await api(`/v1/console/inboxes/${encodeURIComponent(inboxId)}`);
        if (!r.ok) {
          out.innerHTML = `<p class="app-err">${esc(r.json.error || r.status)}</p>`;
          return;
        }
        lastDetail = r.json;
        renderDetail(lastDetail);
      }

      document.getElementById("load").onclick = load;
      if (inboxId && keyEl.value) load();
    </script>
  </body>
</html>
