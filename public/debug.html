<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-41B4KG53D1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-41B4KG53D1");
    </script>
    <title>Debug inboxes — MailAgent</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .debug-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; margin: 1rem 0; }
      .debug-table th, .debug-table td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border, #333); vertical-align: top; }
      .debug-badge { display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 4px; margin-right: 0.25rem; background: #222; color: #aaa; }
      .debug-badge--ok { color: #6f6; }
      .debug-badge--err { color: #f88; }
      .debug-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.75rem 0; }
      .debug-actions button { font-size: 0.8rem; padding: 0.35rem 0.65rem; cursor: pointer; }
      .debug-mono { font-family: ui-monospace, monospace; font-size: 0.8rem; word-break: break-all; }
    </style>
  </head>
  <body class="doc-page" data-site="docs" data-doc="debug">
    <div id="site-nav"></div>

    <div class="doc-layout">
      <aside class="doc-sidebar" id="site-doc-nav" aria-label="Documentation"></aside>
      <article class="doc-content doc-content--wide">
      <h1>Debug inboxes</h1>
      <p class="doc-lead">
        QA view: inboxes for your API key. Open via
        <code>?inbox=INBOX_ID</code> from CI errors or <code>@mailagent/qa</code> debug URL.
      </p>

      <form class="app-form" id="form">
        <label for="base">API base URL</label>
        <input id="base" type="url" value="https://api.webmailagent.com" required />
        <label for="key">Bearer API key</label>
        <input id="key" type="password" placeholder="mak_…" required autocomplete="off" />
        <label for="label">Label filter (optional)</label>
        <input id="label" type="text" placeholder="ci-12345" />
        <button type="submit">Load inboxes</button>
      </form>

      <p class="app-err" id="err" hidden></p>
      <ul class="app-list" id="list"></ul>
      <div class="app-card" id="detail" hidden></div>
      </article>
    </div>

    <div id="site-footer"></div>
    <script src="/site-shell.js" defer></script>
    <script>
      const STORAGE_KEY = "mailagent_debug_key";
      const baseEl = document.getElementById("base");
      const keyEl = document.getElementById("key");
      const labelEl = document.getElementById("label");
      const errEl = document.getElementById("err");
      const listEl = document.getElementById("list");
      const detailEl = document.getElementById("detail");

      const params = new URLSearchParams(location.search);
      const deepInbox = params.get("inbox");

      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) keyEl.value = saved;

      if (params.get("label")) labelEl.value = params.get("label");

      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        await loadInboxList();
      });

      async function authFetch(path) {
        const base = baseEl.value.replace(/\/$/, "");
        const key = keyEl.value.trim();
        localStorage.setItem(STORAGE_KEY, key);
        const res = await fetch(`${base}${path}`, {
          headers: { Authorization: `Bearer ${key}` },
        });
        const data = await res.json().catch(() => ({}));
        return { base, key, res, data };
      }

      async function loadInboxList() {
        errEl.hidden = true;
        detailEl.hidden = true;
        listEl.innerHTML = "";
        const label = labelEl.value.trim();
        const q = label ? `?label=${encodeURIComponent(label)}&limit=50` : "?limit=50";
        try {
          const { res, data } = await authFetch(`/v1/inboxes${q}`);
          if (!res.ok) {
            errEl.textContent = data.error || res.statusText;
            errEl.hidden = false;
            return;
          }
          const inboxes = data.inboxes || [];
          if (!inboxes.length) {
            errEl.textContent = "No active inboxes.";
            errEl.hidden = false;
            return;
          }
          for (const box of inboxes) {
            const li = document.createElement("li");
            li.innerHTML = `<strong>${esc(box.id)}</strong><br /><span class="debug-mono">${esc(box.address)}</span>${box.label ? `<br />label: ${esc(box.label)}` : ""}`;
            li.style.cursor = "pointer";
            li.addEventListener("click", () => loadInboxDetail(box.id, box));
            listEl.appendChild(li);
          }
        } catch (err) {
          errEl.textContent = String(err);
          errEl.hidden = false;
        }
      }

      async function loadInboxDetail(id, boxMeta) {
        detailEl.hidden = false;
        detailEl.innerHTML = "<p>Loading…</p>";
        const { base, res: diagRes, data: diag } = await authFetch(`/v1/inboxes/${id}/diagnose`);
        if (!diagRes.ok) {
          detailEl.innerHTML = `<p class="app-err">${esc(diag.error || diagRes.statusText)}</p>`;
          return;
        }
        const messages = diag.messages || [];
        const deliveries = diag.callbacks || [];

        let html = `<h2>Inbox ${esc(id)}</h2>`;
        if (diag.address) html += `<p class="debug-mono">${esc(diag.address)}</p>`;
        if (diag.label) html += `<p>label: ${esc(diag.label)}</p>`;

        if (Array.isArray(diag.troubleshooting) && diag.troubleshooting.length) {
          html += `<h3>Troubleshooting</h3><ul class="doc-list">`;
          for (const step of diag.troubleshooting) {
            html += `<li>${esc(step)}</li>`;
          }
          html += `</ul>`;
        }

        html += `<div class="debug-actions">`;
        html += btn("Copy wait curl", () => copyCurl(base, id, "wait"));
        html += btn("Copy extract curl", () => copyCurl(base, id, "extract"));
        html += btn("Copy diagnose curl", () => copyCurl(base, id, "diagnose"));
        if (diag.debugUiUrl) {
          html += `<a href="${esc(diag.debugUiUrl)}" target="_blank" rel="noopener"><button type="button">Open share link</button></a>`;
        }
        html += btn("Refresh", () => loadInboxDetail(id, boxMeta));
        html += `</div>`;

        html += `<h3>Messages (${messages.length})</h3>`;
        if (!messages.length) {
          html += `<p class="doc-note">No messages — check webhook, allowlist, staging send.</p>`;
        } else {
          html += `<table class="debug-table"><thead><tr><th>From</th><th>Subject</th><th>OTP</th><th>Links</th><th>Meta</th></tr></thead><tbody>`;
          for (const m of messages) {
            const badges = [];
            if (m.hasRaw) badges.push('<span class="debug-badge debug-badge--ok">raw</span>');
            if (m.attachmentCount > 0) badges.push(`<span class="debug-badge">${m.attachmentCount} att</span>`);
            const links = (m.links || []).slice(0, 2).map((u) => `<a href="${esc(u)}" target="_blank" rel="noopener">link</a>`).join(" ");
            html += `<tr><td class="debug-mono">${esc(m.from || "")}</td><td>${esc(m.subject || "")}</td><td><strong>${esc(m.otp || "—")}</strong></td><td>${links || "—"}</td><td>${badges.join("")}${m.rawUrl ? ` <a href="${esc(base + m.rawUrl)}" target="_blank">.eml</a>` : ""}</td></tr>`;
          }
          html += `</tbody></table>`;
        }

        html += `<h3>Callback log (${deliveries.length})</h3>`;
        if (!deliveries.length) {
          html += `<p class="doc-note">No callback deliveries (callbackUrl not set or no messages yet).</p>`;
        } else {
          html += `<table class="debug-table"><thead><tr><th>OK</th><th>Status</th><th>URL</th><th>Error</th><th>At</th></tr></thead><tbody>`;
          for (const d of deliveries) {
            const okCls = d.ok ? "debug-badge--ok" : "debug-badge--err";
            html += `<tr><td><span class="debug-badge ${okCls}">${d.ok ? "ok" : "fail"}</span></td><td>${esc(String(d.statusCode ?? "—"))}</td><td class="debug-mono">${esc(d.callbackUrl || "")}</td><td>${esc(d.error || "—")}</td><td>${esc(d.createdAt || "")}</td></tr>`;
          }
          html += `</tbody></table>`;
        }

        detailEl.innerHTML = html;
        history.replaceState(null, "", `?inbox=${encodeURIComponent(id)}`);
      }

      function btn(label, fn) {
        const id = "b" + Math.random().toString(36).slice(2);
        setTimeout(() => document.getElementById(id)?.addEventListener("click", fn), 0);
        return `<button type="button" id="${id}">${label}</button>`;
      }

      function copyCurl(base, inboxId, kind) {
        const key = keyEl.value.trim();
        const path =
          kind === "wait"
            ? `/v1/inboxes/${inboxId}/wait?timeout=120`
            : kind === "diagnose"
              ? `/v1/inboxes/${inboxId}/diagnose`
              : `/v1/inboxes/${inboxId}/extract`;
        const curl = `curl -sS "${base}${path}" -H "Authorization: Bearer ${key}"`;
        navigator.clipboard.writeText(curl).catch(() => {});
      }

      function esc(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");
      }

      if (deepInbox && keyEl.value) {
        loadInboxDetail(deepInbox, null);
      } else if (deepInbox) {
        detailEl.hidden = false;
        detailEl.innerHTML = `<p class="doc-note">Enter API key and reload, or submit the form — inbox <code>${esc(deepInbox)}</code> will open automatically.</p>`;
        keyEl.addEventListener("change", () => {
          if (keyEl.value.trim()) loadInboxDetail(deepInbox, null);
        });
      }
    </script>
  </body>
</html>
