<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-41B4KG53D1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-41B4KG53D1");
    </script>
    <title>Debug inboxes — MailAgent</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-page" data-site="app" data-doc="debug">
    <div id="site-nav"></div>

    <main class="app-main app-main--wide">
      <h1>Debug inboxes</h1>
      <p class="app-lead">
        Read-only QA view: list inboxes for your API key (optional <code>label</code> filter).
      </p>

      <form class="app-form" id="form">
        <label for="base">API base URL</label>
        <input id="base" type="url" value="https://api.webmailagent.com" required />
        <label for="key">Bearer API key</label>
        <input id="key" type="password" placeholder="ma_…" required autocomplete="off" />
        <label for="label">Label (optional)</label>
        <input id="label" type="text" placeholder="ci-run-42" />
        <button type="submit">Load inboxes</button>
      </form>

      <p class="app-err" id="err" hidden></p>
      <ul class="app-list" id="list"></ul>
      <div class="app-card" id="detail" hidden></div>
    </main>

    <div id="site-footer"></div>
    <script src="/site-shell.js" defer></script>
    <script>
      const STORAGE_KEY = "mailagent_debug_key";
      const baseEl = document.getElementById("base");
      const keyEl = document.getElementById("key");
      const labelEl = document.getElementById("label");
      const errEl = document.getElementById("err");
      const listEl = document.getElementById("list");
      const detailEl = document.getElementById("detail");

      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) keyEl.value = saved;

      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        errEl.hidden = true;
        detailEl.hidden = true;
        listEl.innerHTML = "";
        const base = baseEl.value.replace(/\/$/, "");
        const key = keyEl.value.trim();
        localStorage.setItem(STORAGE_KEY, key);
        const label = labelEl.value.trim();
        const q = label ? `?label=${encodeURIComponent(label)}&limit=50` : "?limit=50";
        try {
          const res = await fetch(`${base}/v1/inboxes${q}`, {
            headers: { Authorization: `Bearer ${key}` },
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            errEl.textContent = data.error || res.statusText;
            errEl.hidden = false;
            return;
          }
          const inboxes = data.inboxes || [];
          if (!inboxes.length) {
            errEl.textContent = "No active inboxes.";
            errEl.hidden = false;
            return;
          }
          for (const box of inboxes) {
            const li = document.createElement("li");
            li.innerHTML = `<strong>${box.id}</strong><br /><span class="mono">${box.address}</span>${box.label ? `<br />label: ${box.label}` : ""}`;
            li.addEventListener("click", () => loadMessages(base, key, box.id));
            listEl.appendChild(li);
          }
        } catch (err) {
          errEl.textContent = String(err);
          errEl.hidden = false;
        }
      });

      async function loadMessages(base, key, id) {
        detailEl.hidden = false;
        detailEl.innerHTML = "Loading…";
        const res = await fetch(`${base}/v1/inboxes/${id}/messages`, {
          headers: { Authorization: `Bearer ${key}` },
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          detailEl.innerHTML = `<p class="app-err">${data.error || res.statusText}</p>`;
          return;
        }
        const cbRes = await fetch(`${base}/v1/inboxes/${id}/callbacks`, {
          headers: { Authorization: `Bearer ${key}` },
        });
        const cbData = await cbRes.json().catch(() => ({}));
        detailEl.innerHTML =
          `<h2>Inbox ${id}</h2>` +
          `<h3>Messages</h3><pre>${JSON.stringify(data.messages, null, 2)}</pre>` +
          `<h3>Callback log</h3><pre>${JSON.stringify(cbData.deliveries || cbData, null, 2)}</pre>`;
      }
    </script>
  </body>
</html>
