<!-- MailAgent logo mark  512æ512, dark gradient tile + white envelope -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MailAgent">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6b6b6b" />
      <stop offset="100%" stop-color="#141414" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <g fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
    <rect x="128" y="160" width="256" height="192" rx="28" />
    <path d="M144 176l112 104 112-104" />
  </g>
</svg>
