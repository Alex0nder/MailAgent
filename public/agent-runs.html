<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent runs — MailAgent</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="doc-page" data-site="docs" data-doc="agent-runs">
    <div id="site-nav"></div>

    <div class="doc-layout">
      <aside class="doc-sidebar" id="site-doc-nav" aria-label="Documentation"></aside>
      <article class="doc-content doc-content--wide">
      <h1>Agent runs</h1>
      <p class="doc-lead">
        Active inboxes grouped by <code>runId</code> (<code>label=agent-{runId}</code>).
        <a href="/docs/agents.html">Agent docs →</a>
      </p>

      <form class="app-form" id="form" onsubmit="return false">
        <label for="base">API base</label>
        <input id="base" type="url" value="https://api.webmailagent.com" />
        <label for="key">API key</label>
        <input id="key" type="password" autocomplete="off" placeholder="ma_…" />
        <label for="filter">Filter runId (optional)</label>
        <input id="filter" type="text" placeholder="cursor-session-42" />
        <label for="label-filter">Filter label prefix (optional)</label>
        <input id="label-filter" type="text" placeholder="ci-" />
        <button type="button" id="load">Load runs</button>
      </form>

      <div id="list"></div>
      </article>
    </div>

    <div id="site-footer"></div>
    <script src="/site-shell.js" defer></script>
    <script>
      const KEY = "mailagent_dashboard_key";
      const baseEl = document.getElementById("base");
      const keyEl = document.getElementById("key");
      const filterEl = document.getElementById("filter");
      const labelFilterEl = document.getElementById("label-filter");
      const listEl = document.getElementById("list");
      if (localStorage.getItem(KEY)) keyEl.value = localStorage.getItem(KEY);

      document.getElementById("load").onclick = async () => {
        const base = baseEl.value.replace(/\/$/, "");
        const key = keyEl.value.trim();
        if (!key) return;
        localStorage.setItem(KEY, key);
        listEl.innerHTML = '<p class="app-lead" style="margin-top:24px">Loading…</p>';
        const q = new URLSearchParams();
        const runId = filterEl.value.trim();
        const label = labelFilterEl.value.trim();
        if (runId) q.set("runId", runId);
        if (label) q.set("label", label);
        const path = runId && !label
          ? `/v1/agent/runs/${encodeURIComponent(runId)}`
          : `/v1/agent/runs?${q}`;
        const res = await fetch(`${base}${path}`, {
          headers: { Authorization: `Bearer ${key}` },
        });
        const data = await res.json();
        if (!res.ok) {
          listEl.innerHTML = `<p class="app-err">${data.error || res.statusText}</p>`;
          return;
        }
        const runs = data.runs ?? (data.runId ? [data] : []);
        if (!runs.length) {
          listEl.innerHTML =
            '<p class="app-lead" style="margin-top:24px">No active agent runs. Use <code>runId</code> in MCP or <code>POST /v1/agent/verify</code>.</p>';
          return;
        }
        listEl.innerHTML = runs
          .map(
            (r) => `<div class="run-card">
              <h3><code>${r.runId}</code> · ${r.inboxCount} inbox(es)</h3>
              <p class="meta">Latest: ${r.latestAt}</p>
              <ul>${r.inboxes
                .map(
                  (i) =>
                    `<li><code>${i.id}</code> ${i.address}${i.label ? ` <span class="meta">(${i.label})</span>` : ""}
                      — <a href="/console-inbox.html?inbox=${encodeURIComponent(i.id)}">console</a>
                      · <a href="/console-inbox.html?inbox=${encodeURIComponent(i.id)}#simulate-box">simulate</a>
                      · <a href="/debug.html?inbox=${encodeURIComponent(i.id)}">debug</a></li>`
                )
                .join("")}</ul>
            </div>`
          )
          .join("");
      };
    </script>
  </body>
</html>
