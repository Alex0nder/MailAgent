<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Console — MailAgent</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="doc-page" data-site="docs" data-doc="dashboard">
    <div id="site-nav"></div>

    <div class="doc-layout">
      <aside class="doc-sidebar" id="site-doc-nav" aria-label="Documentation"></aside>
      <article class="doc-content">
        <h1>Console</h1>
        <p class="doc-lead">Plan, usage, inboxes, domains, team keys, and billing.</p>

        <form class="app-form" id="form" onsubmit="return false">
          <label for="base">API base</label>
          <input id="base" type="url" value="https://api.webmailagent.com" />
          <label for="key">API key</label>
          <input id="key" type="password" autocomplete="off" placeholder="ma_…" />
          <button type="button" id="load">Refresh</button>
        </form>

        <div class="app-card" id="out">Enter API key and refresh.</div>
      </article>
    </div>

    <div id="site-footer"></div>
    <script src="/site-shell.js" defer></script>
    <script>
      const KEY = "mailagent_dashboard_key";
      const baseEl = document.getElementById("base");
      const keyEl = document.getElementById("key");
      const out = document.getElementById("out");
      if (localStorage.getItem(KEY)) keyEl.value = localStorage.getItem(KEY);

      function stat(label, value, suffix) {
        return `<div class="console-metric">
          <div class="console-metric__label">${label}</div>
          <div class="console-metric__value">${value}${suffix ?? ""}</div>
        </div>`;
      }

      function meter(label, used, max, suffix) {
        const pct = max > 0 ? Math.min(100, Math.round((used / max) * 100)) : 0;
        return `<div class="console-metric">
          <div class="console-metric__label">${label}</div>
          <div class="console-metric__value">${used}${suffix ?? ""} <span>/ ${max}${suffix ?? ""}</span></div>
          <div class="console-meter" aria-hidden="true"><div class="console-meter__fill" style="width:${pct}%"></div></div>
        </div>`;
      }

      function esc(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      async function api(path, opts) {
        const base = baseEl.value.replace(/\/$/, "");
        const key = keyEl.value.trim();
        const r = await fetch(`${base}${path}`, {
          ...opts,
          headers: {
            Authorization: `Bearer ${key}`,
            ...(opts?.headers || {}),
          },
        });
        const json = await r.json().catch(() => ({}));
        return { ok: r.ok, status: r.status, json };
      }

      async function load() {
        const key = keyEl.value.trim();
        if (!key) return;
        localStorage.setItem(KEY, key);
        out.textContent = "Loading…";

        const res = await api("/v1/console/summary");
        if (!res.ok) {
          out.innerHTML = `<p class="app-err">${esc(res.json.error || res.status)}</p>`;
          return;
        }
        const d = res.json;
        const u = d.usage;
        const l = d.limits;

        let html = `<div class="console-head">
          <div>
            <span class="console-plan">${esc(d.plan)}</span>
            ${d.team?.name ? `<span class="console-team">${esc(d.team.name)}</span>` : ""}
          </div>
          <div class="console-actions">`;

        if (d.billing?.canUpgrade) {
          html += `<button type="button" class="app-btn" id="upgrade">Upgrade to Pro</button>`;
        }
        if (d.billing?.canManagePortal) {
          html += `<button type="button" class="app-btn app-btn--ghost" id="portal">Manage billing</button>`;
        }
        html += `</div></div>`;

        const ob = d.capabilities?.outbound;
        if (ob?.enabled && !ob.verifiedFrom && !ob.dedicatedResend) {
          html += `<div class="console-banner">Outbound send works, but <code>OUTBOUND_FROM</code> is not set — deliverability may suffer. <a href="/docs/outbound.html">Setup guide</a></div>`;
        }
        if (
          d.plan === "enterprise" &&
          d.dedicatedResend &&
          !d.dedicatedResend.configured
        ) {
          html += `<div class="console-banner">Enterprise: configure <strong>Dedicated Resend</strong> below before adding custom domains. <a href="/docs/dedicated-domains.html">Setup guide</a></div>`;
        }

        const scope = d.scope;
        if (scope && (scope.labelPrefix || scope.readOnly)) {
          html += `<p class="console-scope">Scope: `;
          if (scope.labelPrefix) html += `prefix <code>${esc(scope.labelPrefix)}</code> `;
          if (scope.readOnly) html += `<em>read-only</em>`;
          html += `</p>`;
        }

        html += `<div class="console-grid">
          ${meter("Active inboxes", u.activeInboxes, l.maxActiveInboxes)}
          ${stat("Messages (24h)", u.messagesLast24h)}
          ${meter("Custom domains", u.customDomains, l.maxCustomDomains)}
          ${d.teamId && u.teamKeysRemaining != null ? meter("Team keys", u.teamKeys, l.maxTeamKeys) : ""}
        </div>`;

        html += `<p class="console-meta">Rate limit: ${l.rateLimitPerMinute} req/min`;
        if (d.teamId) html += ` · Team <code>${esc(d.teamId)}</code>`;
        if (d.policies?.auditRetentionDays) {
          html += ` · Audit retention: ${d.policies.auditRetentionDays}d`;
        }
        html += `</p>`;

        html += `<h2>Recent threads</h2>`;
        if (!d.recentThreads?.length) {
          html += `<p class="console-empty">No conversations yet.</p>`;
        } else {
          html += `<table class="console-table"><thead><tr><th>Subject</th><th>Inbox</th><th>Msgs</th><th>Updated</th></tr></thead><tbody>`;
          for (const t of d.recentThreads) {
            html += `<tr>
              <td>${esc(t.subject || "(no subject)")}</td>
              <td><code>${esc(t.inboxAddress)}</code></td>
              <td>${t.messageCount}</td>
              <td>${esc(new Date(t.lastMessageAt).toLocaleString())}</td>
            </tr>`;
          }
          html += `</tbody></table>`;
        }

        html += `<h2>Recent inboxes</h2>`;
        const canCreateInbox = !scope?.readOnly && (u.inboxesRemaining ?? 0) > 0;
        if (canCreateInbox) {
          html += `<form class="console-key-form" id="create-inbox-form">
            <label for="inbox-label">Label</label>
            <input id="inbox-label" type="text" maxlength="64" placeholder="manual-test" />
            <label for="inbox-service">Service preset (optional)</label>
            <select id="inbox-service">
              <option value="">— any sender —</option>
              <option value="github">github</option>
              <option value="google">google</option>
              <option value="auth0">auth0</option>
              <option value="stripe">stripe</option>
              <option value="vercel">vercel</option>
              <option value="supabase">supabase</option>
            </select>
            <button type="submit" class="app-btn app-btn--ghost">Create inbox</button>
          </form>`;
        } else if (scope?.readOnly) {
          html += `<p class="console-empty">Read-only key — create inboxes via API with a write key.</p>`;
        }
        if (!d.recentInboxes?.length) {
          html += `<p class="console-empty">No active inboxes yet.</p>`;
        } else {
          html += `<table class="console-table"><thead><tr><th>Address</th><th>Label</th><th>Expires</th><th></th></tr></thead><tbody>`;
          for (const i of d.recentInboxes) {
            html += `<tr>
              <td><code>${esc(i.address)}</code></td>
              <td>${esc(i.label || "—")}</td>
              <td>${esc(new Date(i.expiresAt).toLocaleString())}</td>
              <td><a href="/console-inbox.html?inbox=${esc(i.id)}">Open</a> · <a href="/debug.html?inbox=${esc(i.id)}">Debug</a></td>
            </tr>`;
          }
          html += `</tbody></table>`;
        }

        if (d.teamId && (d.plan === "enterprise" || d.dedicatedResend?.configured)) {
          const dr = d.dedicatedResend;
          const canManageDr = d.team?.canManageKeys;
          html += `<h2>Dedicated Resend</h2>`;
          if (d.plan !== "enterprise") {
            html += `<p class="console-empty">Enterprise plan required. Contact <a href="mailto:hello@webmailagent.com">hello@webmailagent.com</a>.</p>`;
          } else if (dr?.configured) {
            const at = dr.configuredAt
              ? new Date(dr.configuredAt).toLocaleString()
              : "—";
            html += `<p class="console-meta">Configured ${esc(at)} · inbound webhook + custom domains use your Resend account.</p>`;
            html += `<div class="console-key-form">
              <label for="dr-webhook-url">Webhook URL (Resend dashboard)</label>
              <input id="dr-webhook-url" type="text" readonly value="${esc(dr.webhookUrl)}" onclick="this.select()" />
              <p class="console-meta">Event: <code>email.received</code> · Outbound send requires inboxes on a verified custom domain.</p>`;
            if (canManageDr) {
              html += `<button type="button" class="console-revoke-btn" id="clear-dedicated-resend">Clear configuration</button>`;
            }
            html += `</div>`;
          } else if (canManageDr) {
            html += `<p class="console-empty">Isolated Resend for domains, inbound, and outbound. <a href="/docs/dedicated-domains.html">Setup guide</a></p>`;
            html += `<form class="console-key-form" id="dedicated-resend-form">
              <label for="dr-api-key">Resend API key</label>
              <input id="dr-api-key" type="password" autocomplete="off" placeholder="re_…" />
              <label for="dr-webhook-secret">Webhook signing secret</label>
              <input id="dr-webhook-secret" type="password" autocomplete="off" placeholder="whsec_…" />
              <button type="submit" class="app-btn app-btn--ghost">Save</button>
            </form>`;
          } else {
            html += `<p class="console-empty">Not configured — use an admin team key to set up dedicated Resend.</p>`;
          }
        }

        html += `<h2>Custom domains</h2>`;
        const canWriteDomains = !scope?.readOnly;
        if (canWriteDomains && (u.domainsRemaining ?? 0) > 0) {
          html += `<form class="console-key-form" id="add-domain-form">
            <label for="domain-name">Domain name</label>
            <input id="domain-name" type="text" placeholder="inbox.yourcompany.com" />
            <button type="submit" class="app-btn app-btn--ghost">Add domain</button>
          </form>`;
        } else if (scope?.readOnly) {
          html += `<p class="console-empty">Read-only key — add domains via an unrestricted key.</p>`;
        }
        if (!d.domains?.length) {
          html += `<p class="console-empty">No domains yet. <a href="/docs/custom-domain.html">Setup guide</a></p>`;
        } else {
          html += `<table class="console-table"><thead><tr><th>Domain</th><th>Status</th><th></th></tr></thead><tbody>`;
          for (const dom of d.domains) {
            const verify =
              canWriteDomains && dom.status !== "verified"
                ? `<button type="button" class="console-revoke-btn" data-verify-id="${esc(dom.id)}">Verify DNS</button>`
                : "";
            const del =
              canWriteDomains
                ? ` <button type="button" class="console-revoke-btn" data-delete-domain="${esc(dom.id)}" data-domain-name="${esc(dom.name)}">Delete</button>`
                : "";
            html += `<tr><td>${esc(dom.name)}</td><td>${esc(dom.status)}</td><td>${verify}${del}</td></tr>`;
          }
          html += `</tbody></table>`;
        }

        if (d.team) {
          html += `<h2>Team keys</h2>`;
          if (!d.team.canManageKeys) {
            html += `<p class="console-empty">Scoped key — create/revoke requires an unrestricted admin key.</p>`;
          } else if ((d.usage.teamKeysRemaining ?? 0) <= 0) {
            html += `<p class="console-empty">Team key limit reached (${d.limits.maxTeamKeys}). Revoke an unused key first.</p>`;
          } else {
            html += `<form class="console-key-form" id="create-key-form">
              <label for="key-label">Label</label>
              <input id="key-label" type="text" maxlength="64" placeholder="ci-bot" />
              <label for="key-prefix">Label prefix (optional)</label>
              <input id="key-prefix" type="text" maxlength="64" placeholder="ci-" />
              <label class="console-check"><input id="key-readonly" type="checkbox" /> Read-only</label>
              <button type="submit" class="app-btn app-btn--ghost">Create key</button>
            </form>`;
          }

          if (!d.team.keys?.length) {
            html += `<p class="console-empty">No keys listed.</p>`;
          } else {
            html += `<table class="console-table"><thead><tr>
              <th>Hint</th><th>Label</th><th>Scope</th><th>Created</th><th></th>
            </tr></thead><tbody>`;
            for (const k of d.team.keys) {
              let scopeTxt = "full";
              if (k.scope?.labelPrefix || k.scope?.readOnly) {
                scopeTxt = "";
                if (k.scope.labelPrefix) scopeTxt += `prefix ${esc(k.scope.labelPrefix)}`;
                if (k.scope.readOnly) scopeTxt += `${scopeTxt ? " · " : ""}read-only`;
              }
              const you = k.current ? " <strong>(you)</strong>" : "";
              const revoke =
                d.team.canManageKeys && !k.current
                  ? `<button type="button" class="console-revoke-btn" data-revoke-id="${esc(k.id)}" data-revoke-hint="${esc(k.hint)}">Revoke</button>`
                  : "";
              html += `<tr>
                <td><code>${esc(k.hint)}</code>${you}</td>
                <td>${esc(k.label || "—")}</td>
                <td>${scopeTxt}</td>
                <td>${esc(new Date(k.createdAt).toLocaleString())}</td>
                <td>${revoke}</td>
              </tr>`;
            }
            html += `</tbody></table>`;
          }
        } else if (!d.teamId) {
          html += `<h2>Team keys</h2>
            <p class="console-empty">Legacy hosted key — run <code>npm run issue:key:db</code> for team invites and scoped keys. See <a href="/docs/teams.html">Teams &amp; keys</a>.</p>`;
        }

        html += `<h2>Audit log</h2><p><a href="/audit.html">Full audit log →</a></p>`;
        if (!d.recentAudit?.length) {
          html += `<p class="console-empty">No events yet.</p>`;
        } else {
          html += `<table class="console-table"><thead><tr><th>Time</th><th>Action</th><th>Resource</th></tr></thead><tbody>`;
          for (const ev of d.recentAudit) {
            const res = ev.resourceId
              ? `${esc(ev.resourceType || "")} ${esc(ev.resourceId)}`
              : "—";
            html += `<tr>
              <td>${esc(new Date(ev.createdAt).toLocaleString())}</td>
              <td><code>${esc(ev.action)}</code></td>
              <td>${res}</td>
            </tr>`;
          }
          html += `</tbody></table>`;
        }

        html += `<p class="console-links"><a href="/debug.html">Debug inboxes</a> · <a href="/agent-runs.html">Agent runs</a> · <a href="/docs/BILLING.html">Billing docs</a></p>`;

        out.innerHTML = html;

        document.getElementById("upgrade")?.addEventListener("click", async () => {
          const r = await api("/v1/billing/checkout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: "{}",
          });
          if (r.json.url) location.href = r.json.url;
          else alert(r.json.error || "Checkout failed");
        });

        document.getElementById("portal")?.addEventListener("click", async () => {
          const r = await api("/v1/billing/portal", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: "{}",
          });
          if (r.json.url) location.href = r.json.url;
          else alert(r.json.error || "Portal failed");
        });

        document.getElementById("create-inbox-form")?.addEventListener("submit", async (e) => {
          e.preventDefault();
          const label = document.getElementById("inbox-label")?.value.trim() || undefined;
          const service = document.getElementById("inbox-service")?.value.trim() || undefined;
          const body = { label, ttlMinutes: 60 };
          if (service) body.service = service;
          const r = await api("/v1/inboxes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (r.ok && r.json.id) {
            location.href = `/console-inbox.html?inbox=${encodeURIComponent(r.json.id)}`;
          } else alert(r.json.error || r.json.hint || "Create failed");
        });

        document.getElementById("create-key-form")?.addEventListener("submit", async (e) => {
          e.preventDefault();
          const label = document.getElementById("key-label")?.value.trim() || undefined;
          const prefix = document.getElementById("key-prefix")?.value.trim() || undefined;
          const readOnly = Boolean(document.getElementById("key-readonly")?.checked);
          const body = { label };
          if (prefix || readOnly) body.scope = { labelPrefix: prefix || undefined, readOnly };
          const r = await api("/v1/team/keys", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (r.json.key) {
            showKeyOnce(r.json.key, r.json.hint);
            load();
          } else alert(r.json.error || r.json.hint || "Failed");
        });

        out.querySelectorAll("[data-revoke-id]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-revoke-id");
            const hint = btn.getAttribute("data-revoke-hint");
            if (!id || !confirm(`Revoke key ${hint}? This cannot be undone.`)) return;
            const r = await api(`/v1/team/keys/${id}`, { method: "DELETE" });
            if (r.ok) load();
            else alert(r.json.error || r.json.hint || "Revoke failed");
          });
        });

        document.getElementById("add-domain-form")?.addEventListener("submit", async (e) => {
          e.preventDefault();
          const name = document.getElementById("domain-name")?.value.trim();
          if (!name) return;
          const r = await api("/v1/domains", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name }),
          });
          if (r.ok && r.json.dnsRecords) {
            showDnsRecords(r.json.name, r.json.dnsRecords);
            load();
          } else alert(r.json.error || r.json.hint || "Add domain failed");
        });

        out.querySelectorAll("[data-verify-id]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-verify-id");
            if (!id) return;
            btn.disabled = true;
            const r = await api(`/v1/domains/${id}/verify`, { method: "POST" });
            if (r.ok) load();
            else alert(r.json.error || r.json.hint || "Verify failed");
            btn.disabled = false;
          });
        });

        out.querySelectorAll("[data-delete-domain]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-delete-domain");
            const name = btn.getAttribute("data-domain-name");
            if (!id || !confirm(`Delete domain ${name}?`)) return;
            const r = await api(`/v1/domains/${id}`, { method: "DELETE" });
            if (r.ok) load();
            else alert(r.json.error || r.json.hint || "Delete failed");
          });
        });

        document.getElementById("dedicated-resend-form")?.addEventListener("submit", async (e) => {
          e.preventDefault();
          const resendApiKey = document.getElementById("dr-api-key")?.value.trim();
          const webhookSecret = document.getElementById("dr-webhook-secret")?.value.trim();
          if (!resendApiKey || !webhookSecret) {
            alert("Resend API key and webhook secret are required");
            return;
          }
          const r = await api("/v1/team/dedicated-resend", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ resendApiKey, webhookSecret }),
          });
          if (r.ok) {
            document.getElementById("dr-api-key").value = "";
            document.getElementById("dr-webhook-secret").value = "";
            load();
          } else alert(r.json.error || r.json.hint || "Save failed");
        });

        document.getElementById("clear-dedicated-resend")?.addEventListener("click", async () => {
          if (!confirm("Clear dedicated Resend? Custom domains on your account will stop working until reconfigured.")) return;
          const r = await api("/v1/team/dedicated-resend", { method: "DELETE" });
          if (r.ok) load();
          else alert(r.json.error || r.json.hint || "Clear failed");
        });
      }

      function showDnsRecords(name, records) {
        const rows = (records || [])
          .map(
            (rec) =>
              `<tr><td><code>${esc(rec.type)}</code></td><td>${esc(rec.name)}</td><td><code>${esc(rec.value)}</code></td></tr>`
          )
          .join("");
        const wrap = document.createElement("div");
        wrap.className = "console-key-once";
        wrap.innerHTML = `<p><strong>DNS for ${esc(name)}</strong> — add these records, then click Verify DNS:</p>
          <table class="console-table"><thead><tr><th>Type</th><th>Name</th><th>Value</th></tr></thead><tbody>${rows}</tbody></table>
          <button type="button" class="app-btn app-btn--ghost">Dismiss</button>`;
        wrap.querySelector("button")?.addEventListener("click", () => wrap.remove());
        out.prepend(wrap);
      }

      function showKeyOnce(key, hint) {
        const wrap = document.createElement("div");
        wrap.className = "console-key-once";
        wrap.innerHTML = `<p><strong>New key ${esc(hint || "")}</strong> — copy now, shown once:</p>
          <input type="text" readonly value="${esc(key)}" onclick="this.select()" />
          <button type="button" class="app-btn app-btn--ghost">Dismiss</button>`;
        wrap.querySelector("button")?.addEventListener("click", () => wrap.remove());
        out.prepend(wrap);
      }

      document.getElementById("load").onclick = load;
      const billing = new URLSearchParams(location.search).get("billing");
      if (billing === "success" || billing === "portal") {
        setTimeout(load, 500);
      }
    </script>
  </body>
</html>
