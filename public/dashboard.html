<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Console — MailAgent</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="doc-page" data-site="docs" data-doc="dashboard">
    <div id="site-nav"></div>

    <div class="doc-layout">
      <aside class="doc-sidebar" id="site-doc-nav" aria-label="Documentation"></aside>
      <article class="doc-content">
        <h1>Console</h1>
        <p class="doc-lead">Plan, usage, inboxes, domains, team keys, and billing.</p>

        <form class="app-form" id="form" onsubmit="return false">
          <label for="base">API base</label>
          <input id="base" type="url" value="https://api.webmailagent.com" />
          <label for="key">API key</label>
          <input id="key" type="password" autocomplete="off" placeholder="ma_…" />
          <button type="button" id="load">Refresh</button>
        </form>

        <div class="app-card" id="out">Enter API key and refresh.</div>
      </article>
    </div>

    <div id="site-footer"></div>
    <script src="/site-shell.js" defer></script>
    <script>
      const KEY = "mailagent_dashboard_key";
      const baseEl = document.getElementById("base");
      const keyEl = document.getElementById("key");
      const out = document.getElementById("out");
      if (localStorage.getItem(KEY)) keyEl.value = localStorage.getItem(KEY);

      function stat(label, value, suffix) {
        return `<div class="console-metric">
          <div class="console-metric__label">${label}</div>
          <div class="console-metric__value">${value}${suffix ?? ""}</div>
        </div>`;
      }

      function meter(label, used, max, suffix) {
        const pct = max > 0 ? Math.min(100, Math.round((used / max) * 100)) : 0;
        return `<div class="console-metric">
          <div class="console-metric__label">${label}</div>
          <div class="console-metric__value">${used}${suffix ?? ""} <span>/ ${max}${suffix ?? ""}</span></div>
          <div class="console-meter" aria-hidden="true"><div class="console-meter__fill" style="width:${pct}%"></div></div>
        </div>`;
      }

      function esc(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      async function api(path, opts) {
        const base = baseEl.value.replace(/\/$/, "");
        const key = keyEl.value.trim();
        const r = await fetch(`${base}${path}`, {
          ...opts,
          headers: {
            Authorization: `Bearer ${key}`,
            ...(opts?.headers || {}),
          },
        });
        const json = await r.json().catch(() => ({}));
        return { ok: r.ok, status: r.status, json };
      }

      async function load() {
        const key = keyEl.value.trim();
        if (!key) return;
        localStorage.setItem(KEY, key);
        out.textContent = "Loading…";

        const res = await api("/v1/console/summary");
        if (!res.ok) {
          out.innerHTML = `<p class="app-err">${esc(res.json.error || res.status)}</p>`;
          return;
        }
        const d = res.json;
        const u = d.usage;
        const l = d.limits;

        let html = `<div class="console-head">
          <div>
            <span class="console-plan">${esc(d.plan)}</span>
            ${d.team?.name ? `<span class="console-team">${esc(d.team.name)}</span>` : ""}
          </div>
          <div class="console-actions">`;

        if (d.billing?.canUpgrade) {
          html += `<button type="button" class="app-btn" id="upgrade">Upgrade to Pro</button>`;
        }
        if (d.billing?.canManagePortal) {
          html += `<button type="button" class="app-btn app-btn--ghost" id="portal">Manage billing</button>`;
        }
        html += `</div></div>`;

        const scope = d.scope;
        if (scope && (scope.labelPrefix || scope.readOnly)) {
          html += `<p class="console-scope">Scope: `;
          if (scope.labelPrefix) html += `prefix <code>${esc(scope.labelPrefix)}</code> `;
          if (scope.readOnly) html += `<em>read-only</em>`;
          html += `</p>`;
        }

        html += `<div class="console-grid">
          ${meter("Active inboxes", u.activeInboxes, l.maxActiveInboxes)}
          ${stat("Messages (24h)", u.messagesLast24h)}
          ${meter("Custom domains", u.customDomains, l.maxCustomDomains)}
          ${d.teamId && u.teamKeysRemaining != null ? meter("Team keys", u.teamKeys, l.maxTeamKeys) : ""}
        </div>`;

        html += `<p class="console-meta">Rate limit: ${l.rateLimitPerMinute} req/min`;
        if (d.teamId) html += ` · Team <code>${esc(d.teamId)}</code>`;
        if (d.policies?.auditRetentionDays) {
          html += ` · Audit retention: ${d.policies.auditRetentionDays}d`;
        }
        html += `</p>`;

        html += `<h2>Recent threads</h2>`;
        if (!d.recentThreads?.length) {
          html += `<p class="console-empty">No conversations yet.</p>`;
        } else {
          html += `<table class="console-table"><thead><tr><th>Subject</th><th>Inbox</th><th>Msgs</th><th>Updated</th></tr></thead><tbody>`;
          for (const t of d.recentThreads) {
            html += `<tr>
              <td>${esc(t.subject || "(no subject)")}</td>
              <td><code>${esc(t.inboxAddress)}</code></td>
              <td>${t.messageCount}</td>
              <td>${esc(new Date(t.lastMessageAt).toLocaleString())}</td>
            </tr>`;
          }
          html += `</tbody></table>`;
        }

        html += `<h2>Recent inboxes</h2>`;
        if (!d.recentInboxes?.length) {
          html += `<p class="console-empty">No active inboxes. Create one via API or MCP.</p>`;
        } else {
          html += `<table class="console-table"><thead><tr><th>Address</th><th>Label</th><th>Expires</th><th></th></tr></thead><tbody>`;
          for (const i of d.recentInboxes) {
            html += `<tr>
              <td><code>${esc(i.address)}</code></td>
              <td>${esc(i.label || "—")}</td>
              <td>${esc(new Date(i.expiresAt).toLocaleString())}</td>
              <td><a href="/console-inbox.html?inbox=${esc(i.id)}">Open</a> · <a href="/debug.html?inbox=${esc(i.id)}">Debug</a></td>
            </tr>`;
          }
          html += `</tbody></table>`;
        }

        html += `<h2>Custom domains</h2>`;
        if (!d.domains?.length) {
          html += `<p class="console-empty">No domains. <code>POST /v1/domains</code> to add one.</p>`;
        } else {
          html += `<table class="console-table"><thead><tr><th>Domain</th><th>Status</th></tr></thead><tbody>`;
          for (const dom of d.domains) {
            html += `<tr><td>${esc(dom.name)}</td><td>${esc(dom.status)}</td></tr>`;
          }
          html += `</tbody></table>`;
        }

        if (d.team?.keys?.length) {
          html += `<h2>Team keys</h2><ul class="console-keys">`;
          for (const k of d.team.keys) {
            let tag = "";
            if (k.scope?.labelPrefix || k.scope?.readOnly) {
              tag = " — ";
              if (k.scope.labelPrefix) tag += `prefix ${esc(k.scope.labelPrefix)} `;
              if (k.scope.readOnly) tag += "read-only";
            }
            html += `<li><code>${esc(k.hint)}</code> ${esc(k.label || "")}${tag}${k.current ? " <strong>(you)</strong>" : ""}</li>`;
          }
          html += `</ul>`;
          html += `<button type="button" class="app-btn app-btn--ghost" id="invite">Create key</button>`;
        }

        html += `<h2>Audit log</h2>`;
        if (!d.recentAudit?.length) {
          html += `<p class="console-empty">No events yet.</p>`;
        } else {
          html += `<table class="console-table"><thead><tr><th>Time</th><th>Action</th><th>Resource</th></tr></thead><tbody>`;
          for (const ev of d.recentAudit) {
            const res = ev.resourceId
              ? `${esc(ev.resourceType || "")} ${esc(ev.resourceId)}`
              : "—";
            html += `<tr>
              <td>${esc(new Date(ev.createdAt).toLocaleString())}</td>
              <td><code>${esc(ev.action)}</code></td>
              <td>${res}</td>
            </tr>`;
          }
          html += `</tbody></table>`;
        }

        html += `<p class="console-links"><a href="/debug.html">Debug inboxes</a> · <a href="/agent-runs.html">Agent runs</a> · <a href="/docs/BILLING.html">Billing docs</a></p>`;

        out.innerHTML = html;

        document.getElementById("upgrade")?.addEventListener("click", async () => {
          const r = await api("/v1/billing/checkout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: "{}",
          });
          if (r.json.url) location.href = r.json.url;
          else alert(r.json.error || "Checkout failed");
        });

        document.getElementById("portal")?.addEventListener("click", async () => {
          const r = await api("/v1/billing/portal", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: "{}",
          });
          if (r.json.url) location.href = r.json.url;
          else alert(r.json.error || "Portal failed");
        });

        document.getElementById("invite")?.addEventListener("click", async () => {
          const label = prompt("Label for new key (optional):") || undefined;
          const prefix = prompt("Label prefix (optional, e.g. ci-):") || undefined;
          const readOnly = prefix
            ? confirm("Read-only key? (OK = yes, Cancel = read/write)")
            : false;
          const body = { label };
          if (prefix) body.scope = { labelPrefix: prefix, readOnly };
          const r = await api("/v1/team/keys", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (r.json.key) {
            prompt("Copy this key (shown once):", r.json.key);
            load();
          } else alert(r.json.error || "Failed");
        });
      }

      document.getElementById("load").onclick = load;
      const billing = new URLSearchParams(location.search).get("billing");
      if (billing === "success" || billing === "portal") {
        setTimeout(load, 500);
      }
    </script>
  </body>
</html>
