<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard — MailAgent</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-page" data-site="app" data-doc="dashboard">
    <div id="site-nav"></div>

    <main class="app-main">
      <h1>Dashboard</h1>
      <p class="app-lead">Plan, usage, and billing for your API key.</p>

      <form class="app-form" id="form" onsubmit="return false">
        <label for="base">API base</label>
        <input id="base" type="url" value="https://api.webmailagent.com" />
        <label for="key">API key</label>
        <input id="key" type="password" autocomplete="off" placeholder="ma_…" />
        <button type="button" id="load">Refresh</button>
      </form>

      <div class="app-card" id="out">Enter API key and refresh.</div>
    </main>

    <div id="site-footer"></div>
    <script src="/site-shell.js" defer></script>
    <script>
      const KEY = "mailagent_dashboard_key";
      const baseEl = document.getElementById("base");
      const keyEl = document.getElementById("key");
      const out = document.getElementById("out");
      if (localStorage.getItem(KEY)) keyEl.value = localStorage.getItem(KEY);

      async function load() {
        const base = baseEl.value.replace(/\/$/, "");
        const key = keyEl.value.trim();
        if (!key) return;
        localStorage.setItem(KEY, key);
        out.textContent = "Loading…";
        const headers = { Authorization: `Bearer ${key}` };
        const [me, stats] = await Promise.all([
          fetch(`${base}/v1/me`, { headers }).then((r) => r.json()),
          fetch(`${base}/v1/stats`, { headers }).then((r) => r.json()),
        ]);
        let html = `<p><strong>Plan:</strong> ${me.plan ?? "?"}</p>`;
        const scope = me.scope;
        if (scope && (scope.labelPrefix || scope.readOnly)) {
          html += `<p><strong>Scope:</strong> `;
          if (scope.labelPrefix) html += `prefix <code>${scope.labelPrefix}</code> `;
          if (scope.readOnly) html += `<em>read-only</em>`;
          html += `</p>`;
        } else if (scope) {
          html += `<p><strong>Scope:</strong> full access</p>`;
        }
        html += `<p>Active inboxes: ${me.usage?.activeInboxes ?? "?"} / ${me.limits?.maxActiveInboxes ?? "?"}</p>`;
        html += `<p>Rate limit: ${me.limits?.rateLimitPerMinute ?? "?"} req/min</p>`;
        if (me.teamId) {
          html += `<p>Team: <code>${me.teamId}</code></p>`;
          const team = await fetch(`${base}/v1/team`, { headers }).then((r) => r.json());
          if (team.keys) {
            html += `<h3>Team keys</h3><ul>`;
            for (const k of team.keys) {
              let scopeTag = "";
              const s = k.scope;
              if (s && (s.labelPrefix || s.readOnly)) {
                scopeTag = " — ";
                if (s.labelPrefix) scopeTag += `prefix ${s.labelPrefix} `;
                if (s.readOnly) scopeTag += "read-only";
              }
              html += `<li><code>${k.hint}</code> ${k.label || ""}${scopeTag}${k.current ? " (you)" : ""}</li>`;
            }
            html += `</ul>`;
            html += `<button type="button" class="app-btn app-btn--ghost" id="invite">Create key (invite)</button>`;
            html += `<p style="margin-top:12px;font-size:13px;color:var(--text-muted)"><a href="/docs/scoped-keys.html">Scoped keys guide</a></p>`;
          }
        }
        html += `<p style="margin-top:16px"><a href="/agent-runs.html">Agent runs →</a> · <a href="/debug.html">Debug inboxes →</a></p>`;
        html += `<pre>${JSON.stringify({ me, stats }, null, 2)}</pre>`;
        if (me.plan === "free" && me.billing?.stripeEnabled) {
          html += `<button type="button" class="app-btn" id="upgrade">Upgrade to Pro</button>`;
        }
        out.innerHTML = html;
        const invite = document.getElementById("invite");
        if (invite) {
          invite.onclick = async () => {
            const label = prompt("Label for new key (optional):") || undefined;
            const prefix = prompt("Label prefix (optional, e.g. ci-):") || undefined;
            const readOnly = prefix
              ? confirm("Read-only key? (OK = yes, Cancel = read/write)")
              : false;
            const body = { label };
            if (prefix) {
              body.scope = { labelPrefix: prefix, readOnly };
            }
            const r = await fetch(`${base}/v1/team/keys`, {
              method: "POST",
              headers: { ...headers, "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            const d = await r.json();
            if (d.key) {
              prompt("Copy this key (shown once):", d.key);
              load();
            } else alert(d.error || "Failed");
          };
        }
        const up = document.getElementById("upgrade");
        if (up) {
          up.onclick = async () => {
            const r = await fetch(`${base}/v1/billing/checkout`, {
              method: "POST",
              headers: { ...headers, "Content-Type": "application/json" },
              body: "{}",
            });
            const d = await r.json();
            if (d.url) location.href = d.url;
            else alert(d.error || "Checkout failed");
          };
        }
      }
      document.getElementById("load").onclick = load;
      if (new URLSearchParams(location.search).get("billing") === "success") {
        setTimeout(load, 500);
      }
    </script>
  </body>
</html>
