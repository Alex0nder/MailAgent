# MailAgent simulate smoke — copy to your repo or use this starter as template.
# Secret: MAILAGENT_API_KEY

name: MailAgent QA

on:
  workflow_dispatch:
  pull_request:

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Playwright simulate test
        env:
          MAILAGENT_API_URL: https://api.webmailagent.com
          MAILAGENT_API_KEY: ${{ secrets.MAILAGENT_API_KEY }}
        run: npm test
