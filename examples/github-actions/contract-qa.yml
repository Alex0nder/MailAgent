# Contract test: create inbox → POST …/simulate → wait/extract (no real SMTP, no DATABASE_URL).
# Secret: MAILAGENT_API_KEY only

name: MailAgent contract QA

on:
  workflow_dispatch:
  push:
    paths:
      - "src/**"
      - "scripts/contract-qa*.mjs"
      - "scripts/lib/contract-api.mjs"

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm ci

      - name: Contract QA (API simulate)
        env:
          MAILAGENT_API_URL: https://api.webmailagent.com
          MAILAGENT_API_KEY: ${{ secrets.MAILAGENT_API_KEY }}
        run: |
          npm run test:contract:qa
          npm run test:contract:qa:callback
          npm run test:contract:qa:attachments
