# Example: MailAgent in GitHub Actions (QA signup flow)
# Secrets: MAILAGENT_API_URL, MAILAGENT_API_KEY
# Optional: MAILAGENT_SLACK_WEBHOOK

name: QA email verify

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  signup-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm ci

      - name: Smoke MailAgent API
        env:
          MAILAGENT_API_URL: ${{ secrets.MAILAGENT_API_URL }}
          MAILAGENT_API_KEY: ${{ secrets.MAILAGENT_API_KEY }}
        run: |
          curl -sf "$MAILAGENT_API_URL/health" | jq .
          curl -sf "$MAILAGENT_API_URL/v1/agent" \
            -H "Authorization: Bearer $MAILAGENT_API_KEY" | jq .

      - name: Playwright E2E
        env:
          MAILAGENT_API_URL: ${{ secrets.MAILAGENT_API_URL }}
          MAILAGENT_API_KEY: ${{ secrets.MAILAGENT_API_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          CI: "true"
        run: npx playwright test

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure
          path: test-results/
          if-no-files-found: ignore

      - name: MailAgent alerts (Slack + PR comment)
        if: failure()
        env:
          MAILAGENT_API_URL: ${{ secrets.MAILAGENT_API_URL }}
          MAILAGENT_API_KEY: ${{ secrets.MAILAGENT_API_KEY }}
          MAILAGENT_SLACK_WEBHOOK: ${{ secrets.MAILAGENT_SLACK_WEBHOOK }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run ci:mailagent-alerts

      - name: Cleanup MailAgent inboxes
        if: always()
        env:
          MAILAGENT_API_URL: ${{ secrets.MAILAGENT_API_URL }}
          MAILAGENT_API_KEY: ${{ secrets.MAILAGENT_API_KEY }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -sS -X DELETE "$MAILAGENT_API_URL/v1/inboxes?labelPrefix=ci-$RUN_ID" \
            -H "Authorization: Bearer $MAILAGENT_API_KEY" | jq .
