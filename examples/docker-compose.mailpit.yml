# Mailpit for local development (SMTP capture)
# Run: docker compose -f examples/docker-compose.mailpit.yml up -d
# UI: http://localhost:8025  SMTP: localhost:1025

services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailagent-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
