# Smoke QA на feature-ветках (без deploy Worker)
name: QA Smoke

on:
  push:
    branches:
      - "qa/**"
  pull_request:
    branches: [main]

jobs:
  check-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run build:qa
      - run: npm run verify:codex

      - name: Smoke + contract (prod gate)
        env:
          MAILAGENT_API_URL: https://api.webmailagent.com
          MAILAGENT_API_KEY: ${{ secrets.MAILAGENT_API_KEY }}
          SMOKE_EXPECT_ATTACHMENTS: "1"
        run: |
          if [ -z "$MAILAGENT_API_KEY" ]; then
            echo "::error::Set MAILAGENT_API_KEY in GitHub Actions secrets — см. docs/OPERATOR.md"
            exit 1
          fi
          npm run test:prod
