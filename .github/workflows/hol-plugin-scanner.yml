# HOL AI Plugin Scanner — required for awesome-codex-plugins catalog submission (PR #195)
name: HOL Plugin Scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@v1
        with:
          plugin_dir: examples/codex/plugin
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
