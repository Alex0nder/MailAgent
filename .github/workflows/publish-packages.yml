# Publish @mailagent/* to npm (tag v* or manual)
# Trusted Publishing (OIDC) — no NPM_TOKEN if configured on npmjs.com
name: Publish npm packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: npm 11+ for trusted publishing / GAT CLI
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm run publish:check

      - name: Full prod gate before publish
        env:
          MAILAGENT_API_URL: https://api.webmailagent.com
          MAILAGENT_API_KEY: ${{ secrets.MAILAGENT_API_KEY }}
        run: |
          if [ -z "$MAILAGENT_API_KEY" ]; then
            echo "::error::Set MAILAGENT_API_KEY for release gate — see docs/OPERATOR.md"
            exit 1
          fi
          npx playwright install chromium --with-deps
          npm run test:prod

      - name: Publish @mailagent/mcp
        run: node scripts/publish-if-new.mjs mcp/package.json

      - name: Publish @mailagent/qa
        run: node scripts/publish-if-new.mjs packages/mailagent-qa/package.json

      - name: Publish @mailagent/agent
        run: node scripts/publish-if-new.mjs packages/mailagent-agent/package.json
