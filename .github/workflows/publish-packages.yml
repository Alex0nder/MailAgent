# Публикация @mailagent/* на npm (тег v* или manual)
# Trusted Publishing (OIDC) — без NPM_TOKEN, если настроено на npmjs.com
name: Publish npm packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: npm 11+ for trusted publishing / GAT CLI
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm run publish:check

      - name: Publish @mailagent/mcp
        working-directory: mcp
        run: npm publish --access public --provenance

      - name: Publish @mailagent/qa
        working-directory: packages/mailagent-qa
        run: npm publish --access public --provenance

      - name: Publish @mailagent/agent
        working-directory: packages/mailagent-agent
        run: npm publish --access public --provenance
