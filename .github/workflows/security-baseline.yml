# Policy files, npm audit, verify:codex, GitHub secret scanning — no prod secrets
name: Security baseline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  doctor-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: npm run doctor:security
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run doctor:security

      - name: Catalog PR status (weekly)
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run check:catalog-prs
