# Deploy MailAgent Worker to Cloudflare (API; landing — Netlify)
name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "migrations/**"
      - "wrangler.jsonc"
      - "package-lock.json"
      - "package.json"
      - "examples/playwright/**"
      - "scripts/contract-qa*.mjs"
      - "scripts/verify-agent-skill.mjs"
      - "scripts/sync-agent-skill.mjs"
      - "skills/**"
      - ".agents/**"
      - "scripts/test-prod.mjs"
      - "scripts/test-contract-all.mjs"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run verify:codex

      - name: Require Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_API_TOKEN — see docs/CI.md"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_ACCOUNT_ID (see wrangler.jsonc account_id)"
            exit 1
          fi

      - name: Database migrate (optional)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DATABASE_URL" ]; then npm run db:migrate; fi

      - name: Deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke prod gate (light — saves KV quota)
        env:
          MAILAGENT_API_URL: https://api.webmailagent.com
          MAILAGENT_API_KEY: ${{ secrets.MAILAGENT_API_KEY }}
        run: |
          if [ -z "$MAILAGENT_API_KEY" ]; then
            echo "::error::Set MAILAGENT_API_KEY in GitHub Actions secrets — see docs/OPERATOR.md"
            exit 1
          fi
          npm run test:prod:gate
