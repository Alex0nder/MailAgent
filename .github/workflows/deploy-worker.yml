# Деплой MailAgent Worker на Cloudflare (API; лендинг — Netlify)
name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "migrations/**"
      - "wrangler.jsonc"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run verify:codex

      - name: Require Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_API_TOKEN — см. docs/CI.md"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_ACCOUNT_ID (см. wrangler.jsonc account_id)"
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke agent (optional)
        env:
          MAILAGENT_API_URL: https://api.webmailagent.com
          MAILAGENT_API_KEY: ${{ secrets.MAILAGENT_API_KEY }}
          SMOKE_EXPECT_ATTACHMENTS: "1"
        run: |
          if [ -z "$MAILAGENT_API_KEY" ]; then
            echo "MAILAGENT_API_KEY not set — skip smoke"
            exit 0
          fi
          npm run smoke:agent
          npm run smoke:qa

      - name: Contract QA (optional, API simulate — no DATABASE_URL)
        env:
          MAILAGENT_API_URL: https://api.webmailagent.com
          MAILAGENT_API_KEY: ${{ secrets.MAILAGENT_API_KEY }}
        run: |
          if [ -z "$MAILAGENT_API_KEY" ]; then
            echo "skip contract on deploy"
            exit 0
          fi
          npm run test:contract:qa
          npm run test:contract:qa:callback
          npm run test:contract:qa:attachments
          npm run test:contract:qa:threads
